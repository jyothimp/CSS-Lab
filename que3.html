<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin: 0;
    font-family: Arial;
    background-image: linear-gradient(to right, #ccc, #999);
}

.container {
    display: flex;
    height: 100vh;
}

.left {
    width: 50%;
    background: #ddd;
}

.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    background: white;
    padding: 20px;
    width: 300px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: orange;
    color: white;
    border: none;
}

button:hover {
    opacity: 0.7;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .left {
        display: none;
    }

    .right {
        width: 100%;
    }
}

</style>
</head>
<body>

<div class="container">

<div class="left"></div>

<div class="right">
    <div class="form-box">
        <h2>Login Form</h2>

        <label>Email:</label>
        <input type="email">

        <label>Password:</label>
        <input type="password">

        <input type="checkbox"> Remember Me

        <button>Login</button>
    </div>
</div>

</div>

</body>
</html>
